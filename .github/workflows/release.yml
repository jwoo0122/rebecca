name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        name: Calculate release version
        run: |
          version="$(scripts/next-release-version.sh)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ -z "$version" ]]; then
            echo "No release-worthy Conventional Commit since the latest tag."
          else
            echo "Next release: v$version"
          fi

  release:
    if: needs.prepare.outputs.version != ''
    needs: prepare
    runs-on: macos-26
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable

      - name: Print environment
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          xcode-select -p
          rustc --version
          cargo --version

      - name: Build macOS app (Rust CLI + Swift host)
        env:
          REBECCA_BUILD_PROFILE: release
        run: ./scripts/build-macos-app.sh

      - name: Verify macOS app (pre-sign)
        run: ./scripts/verify-macos-app.sh dist/Rebecca.app

      # --- Code Signing ---

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" "$(security list-keychains -d user | tr -d '"')"

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -f pkcs12 \
            -A \
            -k "$KEYCHAIN_PATH"

          SIGNING_IDENTITY=$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Found signing identity: $SIGNING_IDENTITY"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign nested CLI binary
        run: |
          APP_PATH="dist/Rebecca.app"
          CLI_PATH="$APP_PATH/Contents/Resources/bin/rebecca"
          test -x "$CLI_PATH"

          codesign --force \
            --options runtime \
            --timestamp \
            --keychain "$SIGNING_KEYCHAIN" \
            --sign "$SIGNING_IDENTITY" \
            "$CLI_PATH"
          codesign --verify --strict --verbose=2 "$CLI_PATH"

      - name: Sign app
        run: |
          codesign --force \
            --options runtime \
            --timestamp \
            --entitlements macos/Rebecca.entitlements \
            --keychain "$SIGNING_KEYCHAIN" \
            --sign "$SIGNING_IDENTITY" \
            dist/Rebecca.app

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 dist/Rebecca.app
          spctl --assess --type execute --verbose dist/Rebecca.app || true

      # --- Notarization ---

      - name: Notarize
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          KEY_PATH="$RUNNER_TEMP/authkey.p8"
          echo "$ASC_KEY_CONTENT" | base64 --decode > "$KEY_PATH"

          ditto -c -k --keepParent dist/Rebecca.app "$RUNNER_TEMP/Rebecca.zip"

          NOTARY_RESPONSE="$RUNNER_TEMP/notary-response.json"
          if ! xcrun notarytool submit "$RUNNER_TEMP/Rebecca.zip" \
            --key "$KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER" \
            --wait \
            --output-format json > "$NOTARY_RESPONSE"; then
            [[ ! -f "$NOTARY_RESPONSE" ]] || cat "$NOTARY_RESPONSE"
            exit 1
          fi
          cat "$NOTARY_RESPONSE"

          SUBMISSION_ID="$(plutil -extract id raw "$NOTARY_RESPONSE")"
          NOTARY_STATUS="$(plutil -extract status raw "$NOTARY_RESPONSE")"
          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            echo "Notarization failed with status: $NOTARY_STATUS" >&2
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" \
              --key-id "$ASC_KEY_ID" \
              --issuer "$ASC_ISSUER" || true
            exit 1
          fi

      - name: Staple
        run: |
          xcrun stapler staple dist/Rebecca.app
          xcrun stapler validate dist/Rebecca.app

      - name: Verify macOS app (post-sign)
        run: ./scripts/verify-macos-app.sh dist/Rebecca.app

      # --- Release ---

      - name: Create release archive
        id: archive
        run: |
          archive="Rebecca-v${RELEASE_VERSION}.zip"
          ditto -c -k --keepParent dist/Rebecca.app "$archive"
          sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "Archive: $archive"
          echo "SHA-256: $sha256"

      - name: Create release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${RELEASE_VERSION}"
          existing_sha="$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')"
          if [[ -n "$existing_sha" ]]; then
            if [[ "$existing_sha" != "$GITHUB_SHA" ]]; then
              echo "error: tag already points to another commit: $tag" >&2
              exit 1
            fi
            echo "Tag already exists at $GITHUB_SHA: $tag"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -c tag.gpgSign=false tag -a "$tag" "$GITHUB_SHA" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          files: Rebecca-v${{ env.RELEASE_VERSION }}.zip

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ASSET_SHA256: ${{ steps.archive.outputs.sha256 }}
        run: |
          tap_dir="$RUNNER_TEMP/homebrew-tap"
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$TAP_TOKEN" | base64)"
          git -c http.extraheader="$auth_header" clone \
            --depth 1 \
            https://github.com/jwoo0122/homebrew-tap.git \
            "$tap_dir"

          mkdir -p "$tap_dir/Casks"
          ./scripts/render-homebrew-cask.sh "$RELEASE_VERSION" "$ASSET_SHA256" > "$tap_dir/Casks/rebecca.rb"

          ruby -c "$tap_dir/Casks/rebecca.rb"

          git -C "$tap_dir" config user.name "github-actions[bot]"
          git -C "$tap_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tap_dir" add Casks/rebecca.rb
          if git -C "$tap_dir" diff --cached --quiet; then
            echo "Homebrew tap already contains v$RELEASE_VERSION."
          else
            git -C "$tap_dir" commit -m "rebecca $RELEASE_VERSION"
            git -C "$tap_dir" -c http.extraheader="$auth_header" push origin main
          fi

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP/authkey.p8" "$RUNNER_TEMP/Rebecca.zip" "$RUNNER_TEMP/notary-response.json"
